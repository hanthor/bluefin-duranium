# Duranium+Bluefin: Debian-based immutable OS + GNOME + Bluefin tools

[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64

[Output]
ImageId=duranium-bluefin-gnome
OutputDirectory=mkosi.output/%i
Format=disk
ManifestFormat=json
Output=%i
SectorSize=512

[Build]
ToolsTree=default
History=yes

[Content]
Bootable=yes
Bootloader=systemd-boot

# Base system
Packages=dbus
          udev
          ca-certificates

# GNOME Desktop
Packages=gnome-shell
          gnome-terminal
          gnome-control-center
          gnome-calculator
          gnome-clocks
          gnome-weather
          gnome-logs
          gnome-camera
          eog
          totem
          rhythmbox

# Bluefin CLI tools
Packages=bash
          zsh
          git
          curl
          wget
          jq
          ripgrep
          fd-find
          fzf
          neovim
          helix
          tmux
          
          python3
          python3-pip
          nodejs
          npm
          rustup
          golang
          
          podman
          podman-compose
          distrobox
          
          htop
          btop
          eza
          zoxide
          starship
          
          gstreamer1.0-tools
          pipewire
          wireplumber
          
          openssh-server
          openssh-client
          network-manager
          chrony

# X13s and generic ARM64 support
Packages=linux-image-arm64

# Boot configuration
Hostname=duranium-bluefin
Locale=en_US.UTF-8
Timezone=UTC
RootPassword=hashed:!
KernelCommandLine=rw arm64.nopauth clk_ignore_unused pd_ignore_unused efi=noruntime rd.driver.blacklist=qcom_q6v5_pas
