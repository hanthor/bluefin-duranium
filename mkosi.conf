# Duranium+Bluefin: postmarketOS-based immutable OS with GNOME + Bluefin tools
# Main image config - aggregates base, GNOME, and Bluefin CLI tools

[Distribution]
Distribution=postmarketos
Release=edge
Architecture=arm64

[Config]
Dependencies=base
             bluefin-gnome
             bluefin-tools

[Build]
ToolsTree=default
History=yes

[Output]
ImageId=duranium-bluefin-gnome
OutputDirectory=mkosi.output/%i
Format=disk
ManifestFormat=json
Output=%i_%v
SectorSize=512

[Content]
Bootable=yes
Bootloader=systemd-boot
UnifiedKernelImages=unsigned

# X13s and generic ARM64 support
Packages=linux-image-arm64
          postmarketos-x13s

# Boot configuration
Hostname=duranium-bluefin
Locale=en_US.UTF-8
Timezone=UTC
RootPassword=hashed:!
KernelCommandLine=rw arm64.nopauth clk_ignore_unused pd_ignore_unused efi=noruntime rd.driver.blacklist=qcom_q6v5_pas
