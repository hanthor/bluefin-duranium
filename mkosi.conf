# Duranium+Bluefin: Single universal image (.raw.zst)
# Works on X13s, generic arm64, and other EFI-capable arm64 devices

[Output]
ImageId=duranium-bluefin
Format=disk

[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64

[Content]
# Create bootable EFI disk image for arm64 systems
Bootable=yes

# Use ToolsTree to auto-download systemd-boot and other build tools
# This provides bootctl which is required for bootable image creation
ToolsTree=default

# Dracut initramfs (required by Duranium)
Packages=dracut
          dracut-network
          systemd
          e2fsprogs
          
# Base system
Packages=dbus
          udev
          ca-certificates

# Bootloader (systemd-boot is included automatically with Bootable=yes)
# GRUB can be added if needed but systemd-boot is lighter
Packages=systemd-boot

# Kernel + firmware (universal arm64 support)
# Re-enabled for bootable image creation
Packages=linux-image-arm64
          linux-firmware
          firmware-qcom-soc

# GNOME Desktop
Packages=gnome-shell
          gnome-terminal
          gnome-control-center
          gnome-calculator
          gnome-clocks
          gnome-weather
          gnome-logs
          eog
          totem
          rhythmbox

# Bluefin CLI tools
Packages=bash
          zsh
          git
          curl
          wget
          jq
          ripgrep
          fd-find
          fzf
          neovim
          tmux
          
          python3
          python3-pip
          nodejs
          npm
          rustup
          golang
          
          podman
          podman-compose
          
          htop
          btop
          eza
          zoxide
          starship

# Multimedia & codecs
Packages=gstreamer1.0-tools
          gstreamer1.0-plugins-base
          pipewire
          wireplumber

# Networking & system
Packages=openssh-server
          openssh-client
          network-manager
          chrony
          logrotate
