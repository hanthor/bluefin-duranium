# Duranium+Bluefin: Single universal image (.raw.zst)
# Works on X13s, generic arm64, and other EFI-capable arm64 devices

[Output]
ImageId=duranium-bluefin
Format=disk

[Distribution]
Distribution=postmarketos
Release=edge

[Content]
Architecture=arm64

# Dracut initramfs (required by Duranium)
Packages=dracut
          dracut-network
          systemd
          systemd-boot
          e2fsprogs

# Base system from postmarketOS
Packages=postmarketos-base
          postmarketos-mkinitfs
          openrc
          dbus
          eudev

# Kernel + firmware (universal arm64 support)
Packages=linux-lts
          linux-firmware@edge
          linux-firmware-arm@edge

# GNOME Desktop
Packages=gnome-shell
          gnome-terminal
          gnome-control-center
          gnome-calculator
          gnome-clocks
          gnome-weather
          gnome-logs
          eog
          totem
          rhythmbox

# Bluefin CLI tools
Packages=bash
          zsh
          git
          curl
          wget
          jq
          ripgrep
          fd
          fzf
          neovim
          helix
          tmux
          
          python3
          python3-pip
          nodejs
          npm
          rustup
          go
          
          podman
          podman-compose
          
          htop
          btop
          eza
          zoxide
          starship
          man-pages

# Multimedia & codecs
Packages=libvpx
          libvorbis
          libtheora
          libopus
          libflac
          libmp3lame
          gstreamer
          gst-plugins-base
          pipewire
          wireplumber

# Networking & system
Packages=openssh
          openssh-client
          openssh-server
          networkmanager
          chrony
          logrotate
          ca-certificates

# X13s optional support
Packages=linux-firmware-qcom@edge
          gpu-firmware-qcom@edge
          wcnss-wlan@edge
          # qcom-q6v5-pas-firmware@edge

ExtraTree=system_files

Packages=@edge
