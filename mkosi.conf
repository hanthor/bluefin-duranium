# Duranium+Bluefin: Single universal image (.raw.zst)
# Works on X13s, generic arm64, and other EFI-capable arm64 devices

[Output]
ImageId=duranium-bluefin
Format=disk

[Distribution]
Distribution=debian
Release=trixie

[Content]
Architecture=arm64

# Dracut initramfs (required by Duranium)
Packages=dracut
          dracut-network
          systemd
          systemd-boot
          e2fsprogs

# Base system
Packages=dbus
          udev
          ca-certificates

# Kernel + firmware (universal arm64 support)
Packages=linux-image-arm64
          linux-firmware
          linux-firmware-arm

# GNOME Desktop
Packages=gnome-shell
          gnome-terminal
          gnome-control-center
          gnome-calculator
          gnome-clocks
          gnome-weather
          gnome-logs
          eog
          totem
          rhythmbox

# Bluefin CLI tools
Packages=bash
          zsh
          git
          curl
          wget
          jq
          ripgrep
          fd-find
          fzf
          neovim
          helix
          tmux
          
          python3
          python3-pip
          nodejs
          npm
          rustup
          golang
          
          podman
          podman-compose
          
          htop
          btop
          eza
          zoxide
          starship
          man-pages

# Multimedia & codecs
Packages=libvpx
          libvorbis
          libtheora
          libopus
          libflac
          libmp3lame
          gstreamer1.0-tools
          gstreamer1.0-plugins-base
          pipewire
          wireplumber

# Networking & system
Packages=openssh-server
          openssh-client
          network-manager
          chrony
          logrotate
