# Duranium+Bluefin: Single universal image (.raw.zst)
# Works on X13s, generic arm64, and other EFI-capable arm64 devices

[Output]
ImageId=duranium-bluefin
Format=directory

[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64

[Content]
# Create bootable EFI disk image for arm64 systems
Bootable=no

# Don't use ToolsTree - it tries to install grub2 which isn't available for ARM64
# Also skip dracut - it's triggering bootctl in mkosi which isn't available

# Base system
Packages=dbus
          udev
          ca-certificates

# Bootloader will be injected post-build via scripts/make-bootable.sh
# Don't install systemd-boot here as it requires bootctl which isn't available with Bootable=no
# Packages=systemd-boot

# Kernel + firmware (universal arm64 support)
# Only include linux-image-arm64; other firmware packages may not be available in Debian Trixie
Packages=linux-image-arm64

# GNOME Desktop
Packages=gnome-shell
          gnome-terminal
          gnome-control-center
          gnome-calculator
          gnome-clocks
          gnome-weather
          gnome-logs
          eog
          totem
          rhythmbox

# Bluefin CLI tools
Packages=bash
          zsh
          git
          curl
          wget
          jq
          ripgrep
          fd-find
          fzf
          neovim
          tmux
          
          python3
          python3-pip
          nodejs
          npm
          rustup
          golang
          
          podman
          podman-compose
          
          htop
          btop
          eza
          zoxide
          starship

# Multimedia & codecs
Packages=gstreamer1.0-tools
          gstreamer1.0-plugins-base
          pipewire
          wireplumber

# Networking & system
Packages=openssh-server
          openssh-client
          network-manager
          chrony
          logrotate
