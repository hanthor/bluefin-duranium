name: Build Duranium+Bluefin Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'duranium-bluefin/**'
      - '.github/workflows/build-duranium-bluefin.yml'
  pull_request:
    paths:
      - 'duranium-bluefin/**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Create release with this tag (optional)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/duranium-bluefin

jobs:
  build:
    name: Build Duranium+Bluefin
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mkosi \
            zstd \
            e2fsprogs \
            parted \
            dosfstools \
            btrfs-progs \
            xfsprogs \
            squashfs-tools

      - name: Verify mkosi installation
        run: mkosi --version

      - name: Build summary
        
        run: |
          echo "=== Build Configuration ==="
          mkosi -C . summary 2>&1 | head -50

      - name: Build image
         
        run: |
          echo "Starting Duranium+Bluefin build..."
          # Create a fake bootctl to prevent mkosi from calling the real one
          echo '#!/bin/bash' | sudo tee /usr/local/bin/bootctl > /dev/null
          echo 'echo "bootctl intercepted (fake)"' | sudo tee -a /usr/local/bin/bootctl > /dev/null
          sudo chmod +x /usr/local/bin/bootctl
           
          # Make sure fake bootctl is used
          export PATH="/usr/local/bin:$PATH"
           
          # Build
          sudo env PATH="$PATH" mkosi -C . build -vv
        timeout-minutes: 120

      - name: Convert directory to raw image
        run: |
          echo "Converting mkosi directory output to .raw image..."
          ls -la
           
          # Find the directory output from mkosi
          if [ -d "duranium-bluefin" ]; then
            echo "Found duranium-bluefin directory"
            dir_size=$(du -sh duranium-bluefin | cut -f1)
            echo "Directory size: $dir_size"
             
            # Create a sparse raw image (3GB should be enough)
            dd if=/dev/zero of=duranium-bluefin.raw bs=1M count=3000
             
            # Format as ext4
            sudo mkfs.ext4 -F duranium-bluefin.raw
             
            # Mount and copy
            mkdir -p /tmp/mnt
            sudo mount -o loop duranium-bluefin.raw /tmp/mnt
            sudo cp -av duranium-bluefin/* /tmp/mnt/
            sudo umount /tmp/mnt
             
            ls -lh duranium-bluefin.raw
          else
            echo "Error: duranium-bluefin directory not found!"
            ls -la
            exit 1
          fi

      - name: Make bootable (inject systemd-boot)
        run: |
          echo "Injecting systemd-boot into disk image..."
          for img in *.raw; do
            if [ -f "$img" ]; then
              echo "Processing $img..."
              # Ensure we can run bootloader injection
              chmod +x scripts/make-bootable.sh || true
               
              # Try to make bootable
              sudo bash scripts/make-bootable.sh "$img" "${img%.raw}-bootable.raw" 2>&1 || {
                echo "Warning: Bootloader injection failed, using raw image as-is"
                mv "$img" "${img%.raw}-bootable.raw"
              }
            fi
          done
          ls -lh *.raw 2>/dev/null || echo "No raw images found"

      - name: Compress image
          
        run: |
          mkdir -p mkosi.output
          echo "Compressing bootable images with zstd..."
          for img in *.raw; do
            if [ -f "$img" ]; then
              echo "Compressing $img..."
              zstd -19 -f "$img" -o "${img}.zst"
              rm "$img"
              ls -lh "${img}.zst"
              mv "${img}.zst" mkosi.output/
            fi
          done
           
          # Ensure output directory has files
          ls -lh mkosi.output/ || (echo "mkosi.output is empty"; exit 1)

      - name: Show build output
         
        run: |
          ls -lh mkosi.output/
          file mkosi.output/*.raw.zst || true

      - name: Generate build metadata
        id: metadata
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          BUILD_TIME=$(date -u +%H:%M:%S)
          GIT_SHA=$(git rev-parse --short HEAD)
          GIT_REF=$(git describe --tags --always)
          
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "git_sha=${GIT_SHA}" >> $GITHUB_OUTPUT
          echo "git_ref=${GIT_REF}" >> $GITHUB_OUTPUT
          
          # Create metadata file
          cat > mkosi.output/build-metadata.txt << EOF
          Build Date: ${BUILD_DATE}
          Build Time: ${BUILD_TIME}
          Git SHA: ${GIT_SHA}
          Git Ref: ${GIT_REF}
          GitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          
          cat mkosi.output/build-metadata.txt

      - name: Create checksum
        run: |
          cd mkosi.output
          sha256sum *.raw.zst > checksums.sha256
          cat checksums.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duranium-bluefin-${{ steps.metadata.outputs.git_sha }}
          path: mkosi.output/
          retention-days: 30
          if-no-files-found: warn

      - name: Create release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            mkosi.output/*.raw.zst
            mkosi.output/checksums.sha256
            mkosi.output/build-metadata.txt
          body: |
            # Duranium+Bluefin Release
            
            Build Date: ${{ steps.metadata.outputs.build_date }}
            Build Time: ${{ steps.metadata.outputs.build_time }}
            Git Ref: ${{ steps.metadata.outputs.git_ref }}
            Git SHA: ${{ steps.metadata.outputs.git_sha }}
            
            ## Files
            - `duranium-bluefin-arm64.raw.zst` - Bootable disk image (compressed)
            - `checksums.sha256` - SHA256 checksums for verification
            
            ## Quick Deploy
            ```bash
            zstd -d duranium-bluefin-arm64.raw.zst
            sudo dd if=duranium-bluefin-arm64.raw of=/dev/sdX bs=8M status=progress
            ```
            
            ## For X13s
            Optional boot kargs:
            ```
            arm64.nopauth clk_ignore_unused pd_ignore_unused efi=noruntime rd.driver.blacklist=qcom_q6v5_pas
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Duranium+Bluefin build successful**\n\n- Build artifact: duranium-bluefin-${{ steps.metadata.outputs.git_sha }}\n- Git SHA: ${{ steps.metadata.outputs.git_sha }}\n- Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            })

      - name: Build failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `❌ **Duranium+Bluefin build failed**\n\nCheck the [build logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              })
            }
